services:
  # AuthCore API
  api:
    build:
      context: ./AuthCore
      dockerfile: AuthCore.Api/Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_HTTP_PORTS=8080
      # Connection strings
      - ConnectionStrings__PostgreSql=Host=postgres;Port=${POSTGRES_PORT:-5432};Database=${POSTGRES_DB:-auth_core};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-root};Pooling=true
      - Redis__ConnectionString=redis:${REDIS_PORT:-6379},password=${REDIS_PASSWORD:-root},abortConnect=false
      - Redis__KeyPrefix=${REDIS_KEY_PREFIX:-authcore:dev}
      # RabbitMQ
      - Authentication__Jwt__Issuer=authcore-dev
      - Authentication__Jwt__Audience=authcore-dev
      - Authentication__Jwt__SigningKey=12345678901234567890123456789012
      - Authentication__Jwt__AccessTokenLifetimeMinutes=15
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=${RABBITMQ_USER:-guest}
      - RabbitMq__Password=${RABBITMQ_PASSWORD:-root}
      - RabbitMq__EmailVerificationQueue=${RABBITMQ_EMAIL_QUEUE:-authcore.email}
    volumes:
      # Chaves locais do desenvolvedor fora do repositório
      - ${HOME}/.authcore/key:/app/key:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - authcore-net
    restart: unless-stopped

  # PostgreSQL
  postgres:
    image: postgres:17-alpine
    command: postgres -p ${POSTGRES_PORT:-5432}
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth_core}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p ${POSTGRES_PORT:-5432} -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-auth_core}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - authcore-net
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    command: redis-server --port ${REDIS_PORT:-6379} --requirepass ${REDIS_PASSWORD:-root} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT:-6379}", "-a", "${REDIS_PASSWORD:-root}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - authcore-net
    restart: unless-stopped

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-root}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - authcore-net
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:

networks:
  authcore-net:
    driver: bridge
